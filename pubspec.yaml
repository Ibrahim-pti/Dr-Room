name: dr_room
description: "DrRoom - خزمەتگوزاری تەندروستی بۆ دەرگای ماڵتەوە"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^15.1.2
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  pinput: ^6.0.2
  iconsax_flutter: ^1.0.0+1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  image_picker: ^1.2.3
  geolocator: ^14.0.3
  geocoding: ^5.0.0
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  webview_flutter: ^4.14.1
  easy_localization: ^3.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  fonts:
    - family: Rabar
      fonts:
        - asset: Fonts/Rabar-Regular.ttf
        - asset: Fonts/Rabar-Medium.ttf
          weight: 500
        - asset: Fonts/Rabar-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/animations/
    - assets/bodyMap/
    - assets/bodyMap/css/
    - assets/bodyMap/img/
    - assets/bodyMap/_js/
